name: Auto-Update NBA Lineups
on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes during games
  workflow_dispatch:
jobs:
  update-lineups:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Balldontlie Lineup Update
        run: |
          curl -X POST "${{ secrets.BALLDONTLIE_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"operation": "update_lineups"}'
