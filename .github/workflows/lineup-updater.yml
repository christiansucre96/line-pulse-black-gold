name: Auto-Update ESPN Lineups
on:
  schedule:
    - cron: '0 */4 * * *'  # Runs every 4 hours
  workflow_dispatch:      # Allows manual trigger
jobs:
  update-lineups:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Lineup Update
        run: |
          curl -X POST "${{ secrets.CLEVER_ACTION_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"operation": "update_lineups", "sport": "nba"}'
