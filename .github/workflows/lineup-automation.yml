name: Auto-Update NBA Lineups

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-lineups:
    runs-on: ubuntu-latest
    steps:
      - name: Run Projected Lineup Engine
        if: github.event.schedule == '0 15 * * *' || github.event.schedule == '0 17 * * *'
        run: |
          curl -X POST "https://retfkpfvhuseyphvwzxg.supabase.co/functions/v1/projected-lineup-engine" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{}'
      
      - name: Run Confirmed Lineup Scraper
        run: |
          curl -X POST "https://retfkpfvhuseyphvwzxg.supabase.co/functions/v1/espn-lineup-scraper" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"sport": "nba"}'
