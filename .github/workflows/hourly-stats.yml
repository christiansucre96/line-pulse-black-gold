name: Hourly NBA Stats Update

on:
  schedule:
    # Runs every hour at minute 0 (e.g., 1:00, 2:00, 3:00)
    - cron: '0 * * * *'
  
  # Allows you to run it manually from the Actions tab
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Supabase Scraper
        run: |
          curl -X POST https://retfkpfvhuseyphvwzxg.supabase.co/functions/v1/espn-scraper \
            -H "Content-Type: application/json" \
            -d '{"operation": "scrape_finished", "sport": "nba"}'
